version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hypnoforge_backend
    ports:
      - "8000:8000"
    volumes:
      # Mount codebase for development hot-reloading
      - ./backend:/app
      # Persist media outputs and DB on host
      - ./static:/app/static
      - ./output:/app/output
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=sqlite:///./output/hypnoforge.db
      - OUTPUT_DIR=output
      - STATIC_DIR=static
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hypnoforge_frontend
    ports:
      - "5173:5173"
    volumes:
      # Mount codebase for development
      - ./frontend:/app
      # Prevent host node_modules overriding container node_modules
      - /app/node_modules
    depends_on:
      - backend
    restart: always
