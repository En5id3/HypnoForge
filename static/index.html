    // --- Fullscreen Floating Particles (Canvas Logic) ---
    function setupBackgroundParticles() {
      const canvas = document.getElementById('bg-particles');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      if (!ctx) return;

      let width = (canvas.width = window.innerWidth);
      let height = (canvas.height = window.innerHeight);

      const particles = [];
      const numParticles = 25;

      for (let i = 0; i < numParticles; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 4 + 2,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          color: `rgba(${Math.random() > 0.5 ? '26, 115, 232' : '111, 66, 193'}, ${Math.random() * 0.04 + 0.02})`
        });
      }

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);

      let animId;
      function loop() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 0 || p.x > width) p.vx *= -1;
          if (p.y < 0 || p.y > height) p.vy *= -1;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        });
        animId = requestAnimationFrame(loop);
      }
      loop();

      return () => {
        window.removeEventListener('resize', resize);
        cancelAnimationFrame(animId);
      };
    }

    // --- Script Analyzer Component (React Feature: Real-time analysis) ---
    function ScriptAnalyzer({ script }) {
      const stats = useMemo(() => {
        if (!script) return { words: 0, pauses: 0, speedChanges: 0, duration: 0 };
        
        const words = script.split(/\s+/).filter(w => w.trim().length > 0 && !w.startsWith('[')).length;
        
        // Match pause tags: [pause:N]
        const pauseMatches = script.match(/\[pause:\d+\]/g) || [];
        const pausesCount = pauseMatches.length;
        
        // Sum total pause duration
        const pauseDuration = pauseMatches.reduce((acc, curr) => {
          const secs = parseInt(curr.match(/\d+/)[0]);
          return acc + secs;
        }, 0);

        // Match speed tags: [speed:X.XX]
        const speedMatches = script.match(/\[speed:[\d.]+\]/g) || [];
        const speedChangesCount = speedMatches.length;

        // Estimate duration (average 130 words per minute + pauses)
        const speechDurationSec = (words / 130) * 60;
        const totalDurationSec = speechDurationSec + pauseDuration;
        const totalDurationMin = Math.ceil(totalDurationSec / 60);

        return {
          words,
          pauses: pausesCount,
          speedChanges: speedChangesCount,
          duration: totalDurationMin
        };
      }, [script]);

      return React.createElement(
        'div',
        { className: 'grid grid-cols-4 gap-4 p-4 bg-slate-50 border border-slate-200 rounded-2xl text-center shadow-sm' },
        React.createElement('div', null,

          React.createElement('div', { className: 'text-base font-bold text-slate-800 mt-0.5' }, stats.words)
        ),
        React.createElement('div', null,
          React.createElement('div', { className: 'text-[9px] font-bold text-slate-500 uppercase tracking-wider' }, 'Pacing Pauses'),
          React.createElement('div', { className: 'text-base font-bold text-slate-800 mt-0.5' }, stats.pauses)
        ),
        React.createElement('div', null,
          React.createElement('div', { className: 'text-[9px] font-bold text-slate-500 uppercase tracking-wider' }, 'Speed Tags'),
          React.createElement('div', { className: 'text-base font-bold text-slate-800 mt-0.5' }, stats.speedChanges)
        ),
        React.createElement('div', null,
          React.createElement('div', { className: 'text-[9px] font-bold text-slate-500 uppercase tracking-wider' }, 'Est. Length'),
          React.createElement('div', { className: 'text-base font-bold text-primary-500 mt-0.5' }, `${stats.duration} Min`)
        )
      );
    }

            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt, style, session_length: sessionLength })

          if (!response.ok) throw new Error('Failed to connect to rewriter service.');

            setSafetyError(data.rewritten_script.replace('[ERROR: Safety Filter]', '').trim());
            setScript('');

            setScript(data.rewritten_script);

    // --- Web Audio API Canvas Visualizer Component (Appeal/Wow Factor) ---
    function CanvasVisualizer({ audioEl, isPlaying }) {
      const canvasRef = useRef(null);
      const audioCtxRef = useRef(null);
      const analyserRef = useRef(null);
      const sourceRef = useRef(null);
      const animIdRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        let width = (canvas.width = canvas.parentElement.offsetWidth);
        let height = (canvas.height = 45);

        // Simple resizing
        function handleResize() {
          width = canvas.width = canvas.parentElement.offsetWidth;
        }
        window.addEventListener('resize', handleResize);

        // Setup Web Audio nodes if audio elements are playing and not yet linked
        if (isPlaying && audioEl && !audioCtxRef.current) {
          try {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioCtx();
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64; // Smaller size for smooth blocks
            
            const source = audioCtx.createMediaElementSource(audioEl);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            audioCtxRef.current = audioCtx;
            analyserRef.current = analyser;
            sourceRef.current = source;
          } catch (e) {
            console.warn("Failed to capture audio stream for visualizer:", e);
          }
        }

        const bufferLength = analyserRef.current ? analyserRef.current.frequencyBinCount : 16;
        const dataArray = new Uint8Array(bufferLength);

        function draw() {
          animIdRef.current = requestAnimationFrame(draw);
          ctx.clearRect(0, 0, width, height);

          if (analyserRef.current && isPlaying) {
            analyserRef.current.getByteFrequencyData(dataArray);
          } else {
            // Draw dummy static waveforms if not playing
            for (let i = 0; i < bufferLength; i++) {
              dataArray[i] = isPlaying ? Math.random() * 20 + 20 : 5;
            }
          }

          const barWidth = (width / bufferLength) * 0.75;
          let x = 0;

          for (let i = 0; i < bufferLength; i++) {
            const val = dataArray[i];
            // Scale bar height
            const barHeight = (val / 255) * height * 0.95 + 2;

            // Gradient fill (Google Blue to Ethereal Purple)
            const grad = ctx.createLinearGradient(0, height - barHeight, 0, height);
            grad.addColorStop(0, '#1a73e8');
            grad.addColorStop(1, '#d3bbff');
            
            ctx.fillStyle = grad;
            // Draw clean rounded bars
            ctx.beginPath();
            ctx.roundRect(x, height - barHeight, barWidth, barHeight, 3);
            ctx.fill();

            x += barWidth + 3;
          }
        }
        draw();

        return () => {
          window.removeEventListener('resize', handleResize);
          cancelAnimationFrame(animIdRef.current);
        };
      }, [audioEl, isPlaying]);

      return React.createElement('canvas', { ref: canvasRef, className: 'w-full h-11 block rounded-xl overflow-hidden' });
    }
